<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Jay's Boss Battle</title>
  <style>
    :root {
      --bg: #0f0f23;
      --surface: #1a1a3e;
      --card: #252550;
      --border: #3a3a6e;
      --primary: #6c63ff;
      --accent: #ffd700;
      --success: #4ade80;
      --danger: #f87171;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .screen { display: none; padding: 20px 16px; min-height: 100vh; overflow-y: auto; padding-top: max(env(safe-area-inset-top,0px),20px); padding-bottom: 40px; }
    .screen.active { display: block; }

    /* ── TITLE SCREEN ── */
    .title-wrap {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; text-align: center; padding: 20px;
    }
    .title-boss { font-size: 100px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    .title-text { font-size: 28px; font-weight: 800; margin: 12px 0 4px; }
    .title-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }

    /* ── BOSS SELECT ── */
    .boss-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
    .boss-card {
      background: var(--card); border: 2px solid var(--border);
      border-radius: 16px; padding: 16px; text-align: center;
      cursor: pointer; transition: border-color 0.2s, transform 0.1s;
    }
    .boss-card:active { transform: scale(0.97); }
    .boss-card.selected { border-color: var(--danger); background: rgba(248,113,113,0.1); }
    .boss-emoji { font-size: 44px; margin-bottom: 6px; }
    .boss-name { font-size: 14px; font-weight: 700; }
    .boss-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* ── BATTLE SCREEN ── */
    .hp-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .hp-label { font-size: 12px; font-weight: 700; width: 40px; flex-shrink: 0; }
    .hp-bar-bg { flex: 1; background: var(--border); border-radius: 100px; height: 14px; overflow: hidden; }
    .hp-bar-fill { height: 100%; border-radius: 100px; transition: width 0.5s ease; }
    .hp-boss-fill { background: linear-gradient(90deg, var(--danger), #ff6b35); }
    .hp-jay-fill  { background: linear-gradient(90deg, var(--success), #22d3ee); }
    .hp-num { font-size: 13px; font-weight: 700; width: 50px; text-align: right; flex-shrink: 0; }

    .boss-area {
      text-align: center; padding: 20px 0;
      position: relative;
    }
    .boss-sprite {
      font-size: 80px;
      display: inline-block;
      transition: transform 0.1s;
    }
    .boss-sprite.hit { animation: boss-hit 0.4s; }
    @keyframes boss-hit {
      0%{transform:translateX(0)}
      20%{transform:translateX(-12px) scale(0.95)}
      40%{transform:translateX(12px)}
      60%{transform:translateX(-8px)}
      80%{transform:translateX(8px)}
      100%{transform:translateX(0)}
    }
    .boss-sprite.dead { animation: boss-dead 0.6s forwards; }
    @keyframes boss-dead { 0%{transform:scale(1);opacity:1} 100%{transform:scale(0) rotate(180deg);opacity:0} }

    .diff-badge {
      display: inline-block;
      padding: 3px 12px; border-radius: 100px;
      font-size: 12px; font-weight: 700;
      margin-bottom: 12px;
    }
    .diff-easy   { background: rgba(74,222,128,0.2); color: var(--success); border: 1px solid var(--success); }
    .diff-medium { background: rgba(251,191,36,0.2); color: #fbbf24; border: 1px solid #fbbf24; }
    .diff-hard   { background: rgba(248,113,113,0.2); color: var(--danger); border: 1px solid var(--danger); }

    .question-card {
      background: var(--card); border-radius: 16px; padding: 20px;
      margin-bottom: 16px; border: 1px solid var(--border);
    }
    .question-num { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .question-text { font-size: 17px; font-weight: 600; line-height: 1.5; }

    .choice-btn {
      display: block; width: 100%;
      background: var(--surface); border: 2px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
      font-size: 15px; color: var(--text);
      text-align: left; cursor: pointer;
      margin-bottom: 10px;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }
    .choice-btn:active { transform: scale(0.98); }
    .choice-btn.correct { border-color: var(--success); background: rgba(74,222,128,0.15); color: var(--success); }
    .choice-btn.wrong   { border-color: var(--danger);  background: rgba(248,113,113,0.15); color: var(--danger); }
    .choice-btn:disabled { cursor: default; }

    /* Damage float */
    .damage-float {
      position: fixed; font-size: 28px; font-weight: 800;
      pointer-events: none; z-index: 999;
      animation: dmg-float 1.2s ease forwards;
    }
    @keyframes dmg-float {
      0%  { opacity:1; transform: translateY(0) scale(1.2); }
      100%{ opacity:0; transform: translateY(-80px) scale(0.8); }
    }

    /* Streak bar */
    .streak-bar {
      display: flex; gap: 6px; justify-content: center; margin-bottom: 16px;
    }
    .streak-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--border); transition: background 0.2s;
    }
    .streak-dot.filled { background: var(--accent); }

    /* ── RESULT SCREEN ── */
    .result-wrap { text-align: center; padding: 20px; }
    .result-emoji { font-size: 80px; margin-bottom: 16px; }
    .result-title { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    .result-sub { font-size: 15px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.6; }
    .result-xp { font-size: 52px; font-weight: 800; color: var(--accent); margin-bottom: 4px; }
    .result-xp-label { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }
    .score-row { display: flex; justify-content: space-around; margin-bottom: 24px; }
    .score-item { text-align: center; }
    .score-val { font-size: 32px; font-weight: 800; color: var(--accent); }
    .score-label { font-size: 12px; color: var(--text-muted); }

    /* Buttons */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px 24px; border-radius: 12px; border: none;
      font-size: 16px; font-weight: 600; cursor: pointer;
      width: 100%; transition: transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-danger  { background: var(--danger); color: white; }
    .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text); }
    .btn-accent  { background: var(--accent); color: #0f0f23; }

    .section-title { font-size: 22px; font-weight: 800; margin-bottom: 20px; }
    .card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); }

    /* Notification toast */
    .toast {
      position: fixed; top: 60px; left: 50%; transform: translateX(-50%) translateY(-20px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 100px; padding: 8px 20px;
      font-size: 14px; font-weight: 600;
      opacity: 0; transition: all 0.3s;
      z-index: 998; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ═══════════════════════════════════
     TITLE SCREEN
═══════════════════════════════════ -->
<div class="screen active" id="screen-title">
  <div class="title-wrap">
    <div class="title-boss" id="title-boss-emoji">👹</div>
    <div class="title-text">주간 보스 배틀</div>
    <div class="title-sub">Nate the Great 주간 복습</div>
    <div style="background:var(--card);border-radius:16px;padding:16px;margin-bottom:28px;width:100%;max-width:340px;">
      <div style="font-size:13px;color:var(--text-muted);text-align:left;line-height:1.8;">
        ⚔️ 문제를 맞히면 보스에게 데미지<br>
        ❤️ 틀리면 Jay HP 감소<br>
        📈 연속 정답 2개 → 난이도 UP<br>
        💡 틀려도 정답 바로 알려줌
      </div>
    </div>
    <button class="btn btn-danger" onclick="showBossSelect()" style="max-width:340px;">⚔️ 보스 선택하기</button>
    <button class="btn btn-outline" onclick="goHome()" style="max-width:340px;margin-top:10px;">🏠 홈으로</button>
  </div>
</div>

<!-- ═══════════════════════════════════
     BOSS SELECT SCREEN
═══════════════════════════════════ -->
<div class="screen" id="screen-boss-select">
  <div class="section-title">👹 보스 선택</div>
  <div class="boss-grid" id="boss-grid"></div>
  <button class="btn btn-danger" id="start-btn" onclick="startBattle()" disabled>⚔️ 배틀 시작!</button>
  <button class="btn btn-outline" onclick="showScreen('screen-title')" style="margin-top:10px;">← 뒤로</button>
</div>

<!-- ═══════════════════════════════════
     BATTLE SCREEN
═══════════════════════════════════ -->
<div class="screen" id="screen-battle">
  <!-- HP Bars -->
  <div class="card" style="padding:16px;margin-bottom:12px;">
    <div class="hp-row">
      <div class="hp-label" style="color:var(--danger)">👹 보스</div>
      <div class="hp-bar-bg"><div class="hp-bar-fill hp-boss-fill" id="boss-hp-bar" style="width:100%"></div></div>
      <div class="hp-num" id="boss-hp-num">150</div>
    </div>
    <div class="hp-row">
      <div class="hp-label" style="color:var(--success)">💙 Jay</div>
      <div class="hp-bar-bg"><div class="hp-bar-fill hp-jay-fill" id="jay-hp-bar" style="width:100%"></div></div>
      <div class="hp-num" id="jay-hp-num">60</div>
    </div>
  </div>

  <!-- Boss sprite -->
  <div class="boss-area">
    <div class="boss-sprite" id="boss-sprite">👹</div>
    <div style="margin-top:8px;font-size:13px;font-weight:700;" id="boss-battle-name">보스</div>
  </div>

  <!-- Streak & Difficulty -->
  <div style="text-align:center;margin-bottom:8px;">
    <div class="diff-badge diff-easy" id="diff-badge">🌱 EASY</div>
  </div>
  <div class="streak-bar" id="streak-bar">
    <div class="streak-dot" id="s0"></div>
    <div class="streak-dot" id="s1"></div>
    <div class="streak-dot" id="s2"></div>
    <div class="streak-dot" id="s3"></div>
    <div class="streak-dot" id="s4"></div>
  </div>

  <!-- Question -->
  <div class="question-card">
    <div class="question-num" id="q-num">문제 1 / 10</div>
    <div class="question-text" id="q-text">Loading...</div>
  </div>

  <!-- Choices -->
  <div id="choices-wrap"></div>

  <!-- Next btn (hidden until answer) -->
  <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none;margin-top:4px;">
    다음 문제 →
  </button>
</div>

<!-- ═══════════════════════════════════
     RESULT SCREEN
═══════════════════════════════════ -->
<div class="screen" id="screen-result">
  <div class="result-wrap">
    <div class="result-emoji" id="result-emoji">🏆</div>
    <div class="result-title" id="result-title">보스 처치!</div>
    <div class="result-sub" id="result-sub">대단해, Jay!</div>

    <div class="score-row">
      <div class="score-item">
        <div class="score-val" id="res-correct">0</div>
        <div class="score-label">정답</div>
      </div>
      <div class="score-item">
        <div class="score-val" id="res-wrong">0</div>
        <div class="score-label">오답</div>
      </div>
      <div class="score-item">
        <div class="score-val" id="res-max-diff">Easy</div>
        <div class="score-label">최고 난이도</div>
      </div>
      <div class="score-item">
        <div class="score-val" id="res-avg-time">-</div>
        <div class="score-label">평균 응답(초)</div>
      </div>
    </div>

    <div class="result-xp" id="result-xp">+80 XP</div>
    <div class="result-xp-label">획득한 XP (메인 앱에서 확인)</div>

    <!-- Wrong answers review -->
    <div id="wrong-review" style="text-align:left;margin-bottom:24px;"></div>

    <button class="btn btn-danger" onclick="showBossSelect()" style="margin-bottom:10px;">🔄 다시 도전!</button>
    <button class="btn btn-outline" onclick="goHome()">🏠 홈으로</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// QUESTION BANK — Nate the Great and the Lost List
// ══════════════════════════════════════════
const QUESTIONS = {
  easy: [
    { q: "Who comes to Nate asking for help at the start of the story?",
      choices: ["Annie", "Rosamond", "Claude", "Sludge"], ans: 2 },
    { q: "What did Claude lose?",
      choices: ["His homework", "His grocery list", "His map", "His cat"], ans: 1 },
    { q: "What is Nate doing when Claude arrives?",
      choices: ["Eating lunch", "Playing baseball", "On a backyard vacation", "Walking Sludge"], ans: 2 },
    { q: "What does Nate always write before going on a case?",
      choices: ["A list of suspects", "A note to his mother", "A map of the area", "A diary entry"], ans: 1 },
    { q: "What is Nate's favorite food?",
      choices: ["Pizza", "Pancakes", "Sandwiches", "Hot dogs"], ans: 1 },
    { q: "What does Nate draw to show all the ways Claude could have walked?",
      choices: ["A picture of the store", "A list of clues", "A map", "A recipe"], ans: 2 },
    { q: "Who is Rosamond?",
      choices: ["Claude's sister", "A quirky neighbor girl who loves cats", "Nate's teacher", "A store clerk"], ans: 1 },
    { q: "What is Nate's dog's name?",
      choices: ["Rex", "Fang", "Buddy", "Sludge"], ans: 3 },
    { q: "What does Rosamond say she is making when Nate visits her?",
      choices: ["Dog biscuits", "Cat pancakes", "Chocolate cake", "Soup"], ans: 1 },
    { q: "How many cats does Rosamond have?",
      choices: ["Two", "Three", "Four", "Five"], ans: 2 },
    { q: "What is on Claude's grocery list that belongs to cats?",
      choices: ["Milk and butter", "Tuna fish, salmon, and liver", "Sugar and flour", "Salt and eggs"], ans: 1 },
    { q: "Where does the wind blow Nate's map?",
      choices: ["Into the store", "Into the street", "To Rosamond's house", "Under a bush"], ans: 2 },
  ],
  medium: [
    { q: "Why can't Claude find his grocery list?",
      choices: ["He never wrote one", "He dropped it somewhere but can't remember which way he walked", "He left it at the store", "His cats ate it"], ans: 1 },
    { q: "Why does Nate drop his own map outside?",
      choices: ["He doesn't need it anymore", "To see where the wind carries paper — like the lost list", "To give it to Claude", "He dropped it by accident"], ans: 1 },
    { q: "Why do Rosamond's cat pancakes taste fishy?",
      choices: ["She added fish sauce on purpose", "She used Claude's list — tuna fish, salmon, and liver were on it", "Her cats knocked fish into the batter", "The flour was old"], ans: 1 },
    { q: "How does Nate finally solve the mystery?",
      choices: ["Sludge finds the list in the yard", "While making his own pancakes, he realizes Rosamond's recipe matched Claude's list exactly", "Claude finds the list in his pocket", "Rosamond confesses she took it"], ans: 1 },
    { q: "What is the connection between Rosamond's 'recipe' and Claude's list?",
      choices: ["Rosamond wrote the recipe for Claude", "They are the same document — Rosamond mistook the grocery list for a recipe", "Claude copied Rosamond's recipe as his list", "They have some of the same items by coincidence"], ans: 1 },
    { q: "Why does Nate retrace all of Claude's possible routes?",
      choices: ["He enjoys walking around the neighborhood", "If Claude dropped the list on the way, retracing the routes might find it", "He wants to see the grocery store", "He is waiting for Sludge to rest"], ans: 1 },
    { q: "Why is Fang holding paper in his mouth NOT the solution to the mystery?",
      choices: ["Fang doesn't have any paper", "The paper Fang dropped turned out to be Nate's map, not the grocery list", "Fang ate the grocery list", "Nate didn't see what Fang was holding"], ans: 1 },
    { q: "What clue tells Nate that Rosamond's recipe might be connected to Claude's list?",
      choices: ["Rosamond mentions Claude's name", "The pancakes have a fishy taste, and tuna fish, salmon, and liver were on the list", "Sludge finds a matching piece of paper", "Rosamond's cats look guilty"], ans: 1 },
    { q: "Why does Claude remember only some items from his list?",
      choices: ["He is sleeping", "He wrote them down quickly and forgot the rest", "He is too busy to think", "He never read the list carefully"], ans: 1 },
    { q: "What detective method does Nate use to test his theory about the wind?",
      choices: ["He asks Rosamond directly", "He drops his own map and watches where it blows", "He uses Sludge's nose to follow a trail", "He looks in all trash cans nearby"], ans: 1 },
  ],
  hard: [
    { q: "What does the word 'retrace' mean in the story?",
      choices: ["To draw a new picture", "To go back over the same path again", "To throw something away", "To ask for directions"], ans: 1 },
    { q: "What does the word 'ingredient' mean?",
      choices: ["A type of grocery store", "A step in making a map", "One item used in making a recipe", "A type of mystery clue"], ans: 2 },
    { q: "What does 'route' mean in this story?",
      choices: ["A type of list", "A place to buy food", "The path someone takes to get somewhere", "A word for 'recipe'"], ans: 2 },
    { q: "What can we INFER about Claude's character from the fact that he lost his list?",
      choices: ["Claude is clever and organized", "Claude can be forgetful and disorganized", "Claude doesn't like shopping", "Claude is very young"], ans: 1 },
    { q: "Fang holding paper in his mouth is called a 'red herring.' What does this mean?",
      choices: ["A type of fish clue", "Something that looks like a clue but leads you the wrong way", "The most important clue in the story", "A paper with fish drawings on it"], ans: 1 },
    { q: "What does 'reputation' mean when Nate thinks his reputation is at stake?",
      choices: ["His grocery list", "What other people think of his detective skills", "His favorite food", "His dog's behavior"], ans: 1 },
    { q: "What detective skill does Nate use when he drops his own map to test the wind?",
      choices: ["He is being careless", "He is using an experiment to test his theory about what happened", "He wants to make a new map", "He is playing a game"], ans: 1 },
    { q: "What does the word 'vanished' most likely mean?",
      choices: ["Was found quickly", "Was put away safely", "Disappeared and couldn't be found", "Was given to someone"], ans: 2 },
    { q: "What is the BEST lesson we can learn from how Nate solved this case?",
      choices: ["Always carry food when you go out", "Careful thinking and observation can turn small clues into big answers", "Never trust your neighbors", "Dogs are better detectives than people"], ans: 1 },
    { q: "Why does Nate realize the answer WHILE making pancakes at home?",
      choices: ["He finds the list inside his kitchen", "Making pancakes makes him think of recipes and ingredients — connecting to Rosamond's 'recipe'", "His mother tells him the answer", "Sludge brings him a clue from outside"], ans: 1 },
  ]
};

// 커스텀 퀴즈 로드 (엄마 모드에서 AI 생성한 경우 덮어씀)
(function() {
  try {
    const cq = JSON.parse(localStorage.getItem('customQuestions'));
    if(cq && cq.easy && cq.medium && cq.hard) {
      QUESTIONS.easy = cq.easy.map(q=>({q:q.q, choices:q.choices, ans:q.ans}));
      QUESTIONS.medium = cq.medium.map(q=>({q:q.q, choices:q.choices, ans:q.ans}));
      QUESTIONS.hard = cq.hard.map(q=>({q:q.q, choices:q.choices, ans:q.ans}));
    }
  } catch(e) {}
})();

// ══════════════════════════════════════════
// BOSSES
// ══════════════════════════════════════════
const BOSSES = [
  { id:0, emoji:'😼', name:'Rosamond',    desc:'고양이 팬케이크를 만드는 수상한 소녀', hp:140, atk:8  },
  { id:1, emoji:'🐱', name:'Super Hex',   desc:'Rosamond의 가장 강한 고양이',        hp:160, atk:10 },
  { id:2, emoji:'🐕', name:'Fang',        desc:'종이를 물고 다니는 개',              hp:180, atk:11 },
  { id:3, emoji:'🛒', name:'Lost List',   desc:'사라진 장보기 목록의 저주',           hp:200, atk:13 },
  { id:4, emoji:'🥞', name:'Cat Pancake Boss', desc:'생선 맛 팬케이크 최종 보스',   hp:220, atk:15 },
];

// ══════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════
let selectedBoss = null;
let bossHp = 150, bossHpMax = 150;
let jayHp  = 60,  jayHpMax  = 60;
let currentLevel = 0;  // 0=easy 1=medium 2=hard
let correctStreak = 0;
let qIndex = 0;
let totalQuestions = 10;
let correctCount = 0;
let wrongCount = 0;
let maxLevelReached = 0;
let usedQ = { easy:[], medium:[], hard:[], vocab:[] };
let vocabQuestions = [];
let currentQ = null;
let wrongLog = [];
let answered = false;
let questionStartTime = 0;   // 문제 표시 시각 (응답 시간 측정용)
let recentResults = [];      // 최근 5문제 결과 [true/false] (롤링 정확도)

// ══════════════════════════════════════════
// SCREEN UTILS
// ══════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function goHome() { window.location.href = 'index.html'; }
function showBossSelect() {
  renderBossGrid();
  showScreen('screen-boss-select');
  document.getElementById('start-btn').disabled = true;
  selectedBoss = null;
}

function renderBossGrid() {
  document.getElementById('boss-grid').innerHTML = BOSSES.map(b=>`
    <div class="boss-card" id="boss-card-${b.id}" onclick="selectBoss(${b.id})">
      <div class="boss-emoji">${b.emoji}</div>
      <div class="boss-name">${b.name}</div>
      <div class="boss-desc">${b.desc}</div>
      <div style="margin-top:6px;font-size:11px;color:var(--danger)">HP ${b.hp} / ATK ${b.atk}</div>
    </div>`).join('');
}
function selectBoss(id) {
  document.querySelectorAll('.boss-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('boss-card-'+id).classList.add('selected');
  selectedBoss = BOSSES[id];
  document.getElementById('start-btn').disabled = false;
}

// ══════════════════════════════════════════
// BATTLE INIT
// ══════════════════════════════════════════
function startBattle() {
  if (!selectedBoss) return;
  bossHp = bossHpMax = selectedBoss.hp;
  jayHp  = jayHpMax  = 60;
  currentLevel = 0;
  correctStreak = 0;
  qIndex = 0;
  correctCount = 0;
  wrongCount = 0;
  maxLevelReached = 0;
  usedQ = { easy:[], medium:[], hard:[], vocab:[] };
  wrongLog = [];
  answered = false;
  recentResults = [];

  // Word Scout에서 "어려워요"로 표시된 단어 → 보스 배틀 첫 문제로 우선 출제
  try {
    const hw = JSON.parse(localStorage.getItem('jayHardWords') || '[]');
    const FALLBACK = ['뛰어달리다', '조용한', '무서운', '기쁜', '어둡다', '새로운'];
    vocabQuestions = hw.slice(0, 3).map((w, i) => {
      const others = hw.filter((_, j) => j !== i).map(x => x.meaning);
      const distractors = [...others, ...FALLBACK].slice(0, 3);
      const allChoices = [w.meaning, ...distractors];
      // 셔플
      for (let k = allChoices.length - 1; k > 0; k--) {
        const r = Math.floor(Math.random() * (k + 1));
        [allChoices[k], allChoices[r]] = [allChoices[r], allChoices[k]];
      }
      return { q: `"${w.word}"의 뜻은?`, choices: allChoices, ans: allChoices.indexOf(w.meaning) };
    });
  } catch { vocabQuestions = []; }

  document.getElementById('boss-sprite').textContent = selectedBoss.emoji;
  document.getElementById('boss-sprite').className = 'boss-sprite';
  document.getElementById('boss-battle-name').textContent = selectedBoss.name;
  updateHpBars();
  updateStreakBar();
  showScreen('screen-battle');
  loadQuestion();
}

// ══════════════════════════════════════════
// QUESTION ENGINE
// ══════════════════════════════════════════
function getNextQuestion() {
  // Easy 단계에서 Word Scout 어려운 단어 먼저 출제
  if (currentLevel === 0 && vocabQuestions.length > 0 && usedQ.vocab.length < vocabQuestions.length) {
    const available = vocabQuestions.filter((_, i) => !usedQ.vocab.includes(i));
    if (available.length > 0) {
      const pick = Math.floor(Math.random() * available.length);
      const realIdx = vocabQuestions.indexOf(available[pick]);
      usedQ.vocab.push(realIdx);
      return { ...available[pick], level: 0, fromVocab: true };
    }
  }
  const lvlKey = ['easy','medium','hard'][currentLevel];
  const pool = QUESTIONS[lvlKey];
  const available = pool.filter((_,i) => !usedQ[lvlKey].includes(i));
  if (available.length === 0) { usedQ[lvlKey] = []; return getNextQuestion(); }
  const pick = Math.floor(Math.random() * available.length);
  const realIdx = pool.indexOf(available[pick]);
  usedQ[lvlKey].push(realIdx);
  return { ...available[pick], level: currentLevel };
}

function loadQuestion() {
  answered = false;
  questionStartTime = Date.now();
  currentQ = getNextQuestion();
  document.getElementById('q-num').textContent = `문제 ${qIndex+1} / ${totalQuestions}`;
  document.getElementById('q-text').textContent = currentQ.q;
  document.getElementById('next-btn').style.display = 'none';
  updateDiffBadge();
  updateStreakBar();

  const wrap = document.getElementById('choices-wrap');
  wrap.innerHTML = currentQ.choices.map((c,i)=>`
    <button class="choice-btn" id="choice-${i}" onclick="answer(${i})">${String.fromCharCode(65+i)}. ${c}</button>
  `).join('');
}

// ══════════════════════════════════════════
// ANSWER HANDLING
// ══════════════════════════════════════════
function answer(idx) {
  if (answered) return;
  answered = true;

  // Disable all buttons
  currentQ.choices.forEach((_,i)=>{
    const btn = document.getElementById('choice-'+i);
    btn.disabled = true;
    if (i === currentQ.ans) btn.classList.add('correct');
  });

  const correct = idx === currentQ.ans;
  const responseMs = Date.now() - questionStartTime;

  // 롤링 정확도 업데이트 (최근 5문제)
  recentResults.push(correct);
  if (recentResults.length > 5) recentResults.shift();
  const recentAccuracy = recentResults.filter(Boolean).length / recentResults.length;

  if (correct) {
    document.getElementById('choice-'+idx).classList.add('correct');
    correctCount++;
    // vocab 단어 정답 시 jayHardWords에서 제거
    if (currentQ.fromVocab && currentQ.choices && currentQ.ans !== undefined) {
      try {
        const correctWord = currentQ.q.match(/"(.+?)"/)?.[1];
        if (correctWord) {
          let hw = JSON.parse(localStorage.getItem('jayHardWords') || '[]');
          hw = hw.filter(w => w.word !== correctWord);
          localStorage.setItem('jayHardWords', JSON.stringify(hw));
        }
      } catch {}
    }
    correctStreak++;
    const dmg = [15, 22, 35][currentLevel];
    bossHp = Math.max(0, bossHp - dmg);
    spawnDamage('-'+dmg, 'var(--success)', true);
    document.getElementById('boss-sprite').classList.remove('hit');
    void document.getElementById('boss-sprite').offsetWidth;
    document.getElementById('boss-sprite').classList.add('hit');
    if (currentLevel > maxLevelReached) maxLevelReached = currentLevel;
    // 동적 난이도 UP: 연속 2정답 + 최근 정확도 60% 이상 + 빠른 응답(15초 이내)
    const fastResponse = responseMs < 15000;
    if (correctStreak >= 2 && currentLevel < 2 && (recentAccuracy >= 0.6 || fastResponse)) {
      currentLevel++;
      correctStreak = 0;
      setTimeout(()=>showToast(['📈 난이도 UP! Medium!','📈 난이도 UP! Hard!'][currentLevel-1]), 600);
    }
  } else {
    document.getElementById('choice-'+idx).classList.add('wrong');
    wrongCount++;
    correctStreak = 0;
    const dmg = selectedBoss.atk;
    jayHp = Math.max(0, jayHp - dmg);
    spawnDamage('-'+dmg+'HP', 'var(--danger)', false);
    wrongLog.push({ q: currentQ.q, correct: currentQ.choices[currentQ.ans], responseMs });
    // 동적 난이도 DOWN: 오답 + 최근 정확도 40% 미만이면 즉시 레벨 다운
    if (currentLevel > 0 && (recentResults.length >= 3 && recentAccuracy < 0.4)) {
      currentLevel--;
      setTimeout(()=>showToast('📉 난이도 조정됨'), 600);
    } else if (currentLevel > 0 && recentResults.length < 3) {
      currentLevel--;
      setTimeout(()=>showToast('📉 난이도 조정됨'), 600);
    }
  }

  updateHpBars();
  updateStreakBar();
  document.getElementById('next-btn').style.display = 'block';

  qIndex++;

  // Check end conditions
  if (bossHp <= 0) {
    setTimeout(()=>{
      document.getElementById('boss-sprite').classList.add('dead');
      setTimeout(showResult, 700);
    }, 500);
    return;
  }
  if (jayHp <= 0) {
    setTimeout(showResult, 600);
    return;
  }
  if (qIndex >= totalQuestions) {
    setTimeout(showResult, 600);
  }
}

function nextQuestion() {
  if (qIndex >= totalQuestions || bossHp <= 0 || jayHp <= 0) { showResult(); return; }
  loadQuestion();
}

// ══════════════════════════════════════════
// UI UPDATES
// ══════════════════════════════════════════
function updateHpBars() {
  document.getElementById('boss-hp-bar').style.width = (bossHp/bossHpMax*100)+'%';
  document.getElementById('jay-hp-bar').style.width  = (jayHp/jayHpMax*100)+'%';
  document.getElementById('boss-hp-num').textContent = bossHp;
  document.getElementById('jay-hp-num').textContent  = jayHp;
}
function updateDiffBadge() {
  const badge = document.getElementById('diff-badge');
  const data = [
    ['diff-easy','🌱 EASY'],
    ['diff-medium','⚡ MEDIUM'],
    ['diff-hard','🔥 HARD']
  ][currentLevel];
  badge.className = 'diff-badge '+data[0];
  badge.textContent = data[1];
}
function updateStreakBar() {
  for(let i=0;i<5;i++){
    document.getElementById('s'+i).className='streak-dot'+(i<correctStreak?' filled':'');
  }
}
function spawnDamage(text, color, isBoss) {
  const el = document.createElement('div');
  el.className = 'damage-float';
  el.textContent = text;
  el.style.color = color;
  el.style.left = isBoss ? '55%' : '35%';
  el.style.top = isBoss ? '35%' : '55%';
  el.style.fontSize = isBoss ? '32px' : '24px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 1300);
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

// ══════════════════════════════════════════
// RESULT
// ══════════════════════════════════════════
function showResult() {
  const win = bossHp <= 0;
  const survive = jayHp > 0;
  let xp = 0;
  let emoji, title, sub;

  if (win) {
    xp = 100 + correctCount * 5 + maxLevelReached * 20;
    emoji = '🏆'; title = '보스 처치!';
    sub = `대단해, Jay! ${selectedBoss.name}을(를) 물리쳤어!\n${correctCount}개 맞히고 ${wrongCount}개 틀렸어.`;
  } else if (!survive) {
    xp = correctCount * 5;
    emoji = '💪'; title = '아깝다!';
    sub = `${correctCount}개나 맞혔어! 다음엔 보스를 꼭 처치하자!`;
  } else {
    xp = correctCount * 5 + (correctCount >= 7 ? 30 : 0);
    emoji = correctCount >= 7 ? '⭐' : '😊';
    title = correctCount >= 7 ? '훌륭해!' : '잘했어!';
    sub = `10문제 완료! ${correctCount}개 정답!`;
  }

  // Save XP to main app state
  try {
    const s = JSON.parse(localStorage.getItem('jayState')||'{}');
    s.xp = (s.xp||0) + xp;
    s.todayXp = (s.todayXp||0) + xp;
    s.todayMission = true;
    localStorage.setItem('jayState', JSON.stringify(s));
  } catch {}

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-sub').textContent = sub;
  document.getElementById('result-xp').textContent = '+'+xp+' XP';
  document.getElementById('res-correct').textContent = correctCount;
  document.getElementById('res-wrong').textContent = wrongCount;
  document.getElementById('res-max-diff').textContent = ['Easy','Medium','Hard'][maxLevelReached];
  const avgMs = wrongLog.length > 0
    ? Math.round(wrongLog.reduce((s,w)=>s+(w.responseMs||0),0) / wrongLog.length / 1000)
    : '-';
  document.getElementById('res-avg-time').textContent = avgMs;

  // Wrong answers review
  const rev = document.getElementById('wrong-review');
  if (wrongLog.length > 0) {
    rev.innerHTML = `
      <div style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text-muted)">✏️ 틀린 문제 복습</div>
      ${wrongLog.map(w=>`
        <div style="background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid var(--border);">
          <div style="font-size:13px;color:var(--text-muted);margin-bottom:6px;">${w.q}</div>
          <div style="font-size:14px;color:var(--success);font-weight:600;">✅ 정답: ${w.correct}</div>
        </div>`).join('')}`;
  } else {
    rev.innerHTML = `<div style="text-align:center;font-size:14px;color:var(--success);margin-bottom:16px;">🎉 모든 문제를 맞혔어!</div>`;
  }

  showScreen('screen-result');
}

// ══════════════════════════════════════════
// TITLE SCREEN ANIMATION
// ══════════════════════════════════════════
const titleEmojis = ['👹','🐉','🦅','🤖','👾'];
let titleIdx = 0;
setInterval(()=>{
  titleIdx=(titleIdx+1)%titleEmojis.length;
  document.getElementById('title-boss-emoji').textContent=titleEmojis[titleIdx];
},2000);
</script>
